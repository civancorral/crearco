<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Propuesta 1: Monograma geométrico "CC" + Wordmark -->
  <!-- Concepto: Dos "C" entrelazadas formando un escudo de protección financiera -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ad4d0"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="grad1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f6b"/>
      <stop offset="100%" style="stop-color:#1a3fff"/>
    </linearGradient>
  </defs>
  <!-- Icon: Two interlocking C's -->
  <g transform="translate(4, 4)">
    <!-- Outer C (teal gradient) -->
    <path d="M26 2C13.3 2 3 12.3 3 25s10.3 23 23 23c6.2 0 11.8-2.4 16-6.4"
          stroke="url(#grad1)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Inner C (navy) -->
    <path d="M34 14C30.7 10.7 26.1 8.5 21 8.5c-9.1 0-16.5 7.4-16.5 16.5S11.9 41.5 21 41.5"
          stroke="url(#grad1b)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Accent dot -->
    <circle cx="42" cy="18.5" r="3.5" fill="url(#grad1)"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="28" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700" font-size="26" fill="#0a1f6b" letter-spacing="-0.5">Crear</text>
  <text x="62" y="50" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700" font-size="18" fill="#0ad4d0" letter-spacing="3">CO</text>
  <!-- Separator line -->
  <line x1="62" y1="33" x2="110" y2="33" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
